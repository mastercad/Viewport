name: CI

# Läuft nur bei Pull Requests.
# Bei Pushes in main übernimmt der Release-Workflow (der QA bereits einschließt).
# Branch-Protection: "CI / qa / Lint (ESLint)" und "CI / qa / Tests (Vitest)"
# als required status checks eintragen.

on:
  pull_request:

jobs:
  qa:
    uses: ./.github/workflows/qa.yml
