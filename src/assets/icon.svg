<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e2350"/>
      <stop offset="100%" stop-color="#0a0c1c"/>
    </linearGradient>
    <linearGradient id="sf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6080ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6080ff" stop-opacity="0.04"/>
    </linearGradient>
    <!-- subtle inner glow for the front phone -->
    <filter id="gw" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- accent glow -->
    <filter id="ag" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- subtle dot-grid texture -->
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="3" cy="3" r="1.2" fill="white" opacity="0.04"/>
  </pattern>
  <rect width="512" height="512" rx="100" fill="url(#dots)"/>

  <!-- ── MONITOR (back, left) ── -->
  <g opacity="0.26">
    <!-- body -->
    <rect x="74" y="168" width="228" height="158" rx="11"
          fill="url(#sf)" stroke="white" stroke-width="9"/>
    <!-- content lines -->
    <rect x="96"  y="189" width="140" height="7" rx="3.5" fill="white"/>
    <rect x="96"  y="206" width="96"  height="7" rx="3.5" fill="white"/>
    <rect x="96"  y="223" width="120" height="7" rx="3.5" fill="white"/>
    <rect x="96"  y="240" width="80"  height="7" rx="3.5" fill="white"/>
    <!-- stand neck -->
    <rect x="166" y="326" width="44" height="16" rx="5" fill="white"/>
    <!-- stand base -->
    <rect x="132" y="342" width="112" height="9"  rx="4.5" fill="white"/>
  </g>

  <!-- ── TABLET (middle) ── -->
  <g opacity="0.58">
    <rect x="214" y="138" width="124" height="192" rx="17"
          fill="url(#sf)" stroke="white" stroke-width="9"/>
    <!-- content lines -->
    <rect x="230" y="162" width="92" height="6" rx="3" fill="white" opacity="0.6"/>
    <rect x="230" y="176" width="64" height="6" rx="3" fill="white" opacity="0.6"/>
    <rect x="230" y="190" width="78" height="6" rx="3" fill="white" opacity="0.6"/>
    <!-- home bar -->
    <rect x="252" y="318" width="48" height="5" rx="2.5" fill="white" opacity="0.7"/>
  </g>

  <!-- ── PHONE (front, right) ── -->
  <g opacity="1" filter="url(#gw)">
    <rect x="340" y="152" width="88" height="170" rx="19"
          fill="url(#sf)" stroke="white" stroke-width="9.5"/>
    <!-- camera pill -->
    <rect x="365" y="163" width="30" height="8" rx="4" fill="white" opacity="0.55"/>
    <!-- content lines -->
    <rect x="352" y="185" width="64" height="5.5" rx="2.75" fill="white" opacity="0.5"/>
    <rect x="352" y="199" width="44" height="5.5" rx="2.75" fill="white" opacity="0.5"/>
    <rect x="352" y="213" width="56" height="5.5" rx="2.75" fill="white" opacity="0.5"/>
    <!-- home indicator bar -->
    <rect x="360" y="308" width="44" height="5" rx="2.5" fill="white" opacity="0.75"/>
  </g>

  <!-- ── ANNOTATION ACCENT — coral circle with lens/annotation mark ── -->
  <!-- glow halo behind -->
  <circle cx="132" cy="388" r="44" fill="#ff5030" opacity="0.35" filter="url(#ag)"/>
  <!-- main circle -->
  <circle cx="132" cy="388" r="36" fill="#ff5030"/>
  <!-- Camera-lens icon (screenshot) inside -->
  <!-- outer ring -->
  <circle cx="132" cy="388" r="20" fill="none" stroke="white" stroke-width="4"/>
  <!-- inner dot -->
  <circle cx="132" cy="388" r="9" fill="white"/>
  <!-- small top bump (camera mount) -->
  <rect x="122" y="351" width="20" height="9" rx="4" fill="#ff5030"/>
  <!-- bump highlight -->
  <rect x="126" y="352" width="12" height="5" rx="2.5" fill="white" opacity="0.55"/>

  <!-- tiny annotation arrow overlay (top-right of accent, floating) -->
  <g transform="translate(162,360)" opacity="0.92">
    <circle r="14" fill="#ffcc00"/>
    <!-- simple arrow-up-right stroke representing annotation -->
    <line x1="-4" y1="4" x2="5" y2="-5"  stroke="#1a1d38" stroke-width="3.5" stroke-linecap="round"/>
    <polyline points="1,-5 5,-5 5,-1" fill="none" stroke="#1a1d38" stroke-width="3.5"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
